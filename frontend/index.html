<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Origem do Flask (SPA). Ajuste se o backend estiver em outro host/porta. -->
  <meta name="fmp-backend-origin" content="http://127.0.0.1:5050" />
  <title>FMP — Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Espelho de backend/templates/login.html (estático para Vite / GitHub Pages) */
    :root {
      --branco: #FFFFFF;
      --vermelho: #C62828;
      --azul: #0B3353;
      --radius-xl: 14px;
      --card-width: 360px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: linear-gradient(180deg, var(--branco) 0%, #fbfbfb 100%);
      color: var(--azul);
    }

    .center-wrap {
      display: flex;
      gap: 32px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      width: 100%;
      max-width: 1100px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      flex-direction: column;
    }

    .logo img {
      width: 260px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .brand-sub {
      margin-top: 6px;
      color: var(--azul);
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .card {
      width: var(--card-width);
      background: var(--branco);
      border-radius: var(--radius-xl);
      box-shadow: 0 10px 30px rgba(11, 51, 83, 0.08);
      padding: 22px;
      border: 1px solid rgba(11, 51, 83, 0.06);
    }

    .card h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
      color: var(--azul);
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--azul);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(11, 51, 83, 0.15);
      outline: none;
      font-size: 14px;
      transition: box-shadow .15s, border-color .15s;
      background: #fff;
    }

    input:focus {
      border-color: var(--azul);
      box-shadow: 0 6px 20px rgba(11, 51, 83, 0.06);
    }

    input[type="password"],
    input[type="text"].senha-field {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(11, 51, 83, 0.15);
      outline: none;
      font-size: 14px;
      transition: box-shadow .15s, border-color .15s;
      background: #fff;
    }

    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .forgot {
      font-size: 13px;
      color: var(--azul);
      text-decoration: none;
      font-weight: 600;
    }

    .forgot:hover {
      color: var(--vermelho);
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      text-align: center;
      font-weight: 700;
      transition: transform .08s ease, box-shadow .08s;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--azul);
      color: var(--branco);
      box-shadow: 0 8px 20px rgba(11, 51, 83, 0.08);
    }

    .btn-primary:hover {
      opacity: .95;
    }

    .btn-outline {
      margin-top: 8px;
      background: transparent;
      color: var(--azul);
      border: 2px solid rgba(11, 51, 83, 0.12);
      font-weight: 700;
    }

    .btn-outline:hover {
      background: var(--vermelho);
      color: var(--branco);
      border-color: var(--vermelho);
    }

    .small-note {
      font-size: 13px;
      color: rgba(11, 51, 83, 0.7);
      text-align: center;
      margin-top: 8px;
    }

    @media(min-width:900px) {
      .center-wrap {
        flex-direction: row;
      }

      .side-illustration {
        display: block;
        width: 460px;
      }
    }
  </style>
</head>

<body>
  <main class="center-wrap" role="main">
    <section class="logo">
      <img src="./logo.png" alt="Logo FMP — Faculdade Municipal de Palhoça" />
      <div class="brand-sub">
        <div style="font-size:18px;font-weight:700;color:var(--azul)">FMP</div>
        <div style="font-size:13px;color:rgba(11,51,83,0.8);margin-top:2px">Faculdade Municipal de Palhoça</div>
      </div>
    </section>

    <section class="card">
      <h2>Login</h2>

      <form id="loginForm" method="post" action="#">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" value="" placeholder="seu@exemplo.com"
            required />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div style="position:relative;">
            <input id="password" class="senha-field" name="senha" type="password" placeholder="Digite sua senha"
              required />
            <button type="button" id="togglePwd"
              style="position:absolute; right:8px; top:6px; height:32px; padding:6px 8px; border-radius:8px; border:0; background:transparent; cursor:pointer; color:var(--azul); font-weight:700;">
            </button>
          </div>
        </div>

        <div class="row-between" style="margin-bottom:12px;">
          <div></div>
          <a href="http://127.0.0.1:5050/recuperar_senha" class="forgot" id="linkForgot">Esqueci a senha</a>
        </div>

        <div>
          <button class="btn btn-primary" type="submit">Entrar</button>
          <a href="./cadastro.html" class="btn btn-outline" role="button" id="linkCadastro">Cadastrar</a>
        </div>

        <div class="small-note" style="margin-top:12px">
          Não possui conta? Clique em <strong>Cadastrar</strong>.
        </div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        this.textContent = 'Ocultar';
      } else {
        pwd.type = 'password';
        this.textContent = 'Mostrar';
      }
    });

    function fmpBackendOrigin() {
      var m = document.querySelector('meta[name="fmp-backend-origin"]');
      var o = (m && m.content) ? String(m.content).trim().replace(/\/$/, '') : 'http://127.0.0.1:5050';
      return o;
    }
    (function () {
      var o = fmpBackendOrigin();
      var forgot = document.getElementById('linkForgot');
      if (forgot) forgot.href = o + '/recuperar_senha';
    })();

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      if (!this.reportValidity()) return;
      try {
        sessionStorage.setItem('fmp_gh_pages_auth', '1');
        var em = document.getElementById('email');
        if (em && em.value) sessionStorage.setItem('fmp_login_email', em.value.trim());
      } catch (err) { /* ignore */ }
      window.location.href = new URL('index-1.html', window.location.href).href;
    });
  </script>
</body>

</html>
